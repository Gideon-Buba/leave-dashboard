server {
    listen 80;
    server_name leave.gideon-buba.me;

    # Serve the React frontend
    root /var/www/leave-dashboard/client/dist;
    index index.html;

    # Proxy all /api requests to the NestJS backend
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large file uploads (Excel import)
        client_max_body_size 50M;
    }

    # React Router — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
